    <script>
        function switchTab(tabName) {
            // Update Tab Styles
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active-tab', 'text-primary', 'border-b-2', 'border-primary');
                btn.classList.add('text-on-surface-variant');
            });

            const activeBtn = Array.from(document.querySelectorAll('.tab-btn')).find(btn => btn.innerText.includes(
                tabName === 'overview' ? '概览' :
                tabName === 'members' ? '成员' :
                tabName === 'timeline' ? '时间线' : '任务列表'
            ));
            
            if (activeBtn) {
                activeBtn.classList.add('active-tab', 'text-primary', 'border-b-2', 'border-primary');
                activeBtn.classList.remove('text-on-surface-variant');
            }

            // Show/Hide Content
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.add('hidden');
            });
            
            const target = document.getElementById('tab-' + tabName);
            if (target) {
                target.classList.remove('hidden');
            }
        }
    </script>
